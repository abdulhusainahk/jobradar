# ============================================================================
# JobRadar config — target companies + matching rules
# Edit this file to add/remove companies or tune what counts as a match.
# Company feeds use public ATS JSON APIs (Greenhouse / Lever / Ashby) — no
# scraping, no ToS risk. To add a company, find its ATS token (see README).
# ============================================================================

match:
  # A role's TITLE must contain at least one of these (case-insensitive).
  role_keywords:
    - devops
    - "site reliability"
    - sre
    - "platform engineer"
    - "platform engineering"
    - "infrastructure engineer"
    - "cloud engineer"
    - "systems engineer"
    - "systems development"
    - kubernetes
    - "cloud infrastructure"
  # NOTE: "observability" was removed as an inclusion keyword — at observability
  # companies (Datadog/Okta) it matched product roles, not infra-DevOps. It's
  # still used to DETECT monitoring-heavy JDs during fit scoring.

  # Seniority tags — used only to LABEL alerts (not to filter), so you never
  # miss a good role that titles itself unusually.
  seniority_keywords:
    - senior
    - staff
    - lead
    - principal
    - "sde-3"
    - "sde iii"
    - "sde-2"
    - "l5"
    - "l6"

  # Which region groups to alert on. Comment one out to disable it.
  regions_enabled: [india, uae, europe]

  # Drop "monitoring-only" roles (SRE roles whose JD has no DevOps/IaC/CI-CD/
  # automation content) ONLY when they score below this. A senior, DevOps-titled
  # role at big-tech can be boosted above the line and kept. Set 0 to never drop.
  drop_monitoring_below: 45

  # Location keyword groups. A role matches if its location contains any keyword
  # from an ENABLED region (India first per your focus; UAE + Europe per roadmap).
  locations:
    india:
      - mumbai
      - navi mumbai
      - bengaluru
      - bangalore
      - hyderabad
      - pune
      - gurugram
      - gurgaon
      - noida
      - chennai
      - delhi
      - india
    uae:
      - dubai
      - abu dhabi
      - "u.a.e"
      - uae
      - united arab emirates
    europe:
      - dublin
      - ireland
      - berlin
      - munich
      - germany
      - amsterdam
      - netherlands
      - london
      - united kingdom
      - "emea"

  # A bare "Remote" role passes only if it ALSO mentions one of these regions
  # (so a US-only remote role at a global company doesn't spam you).
  remote_region_keywords:
    - india
    - apac
    - asia
    - emea
    - europe
    - global
    - worldwide
    - anywhere

  # Experience band — you're ~this many years in; avoid roles far below/above.
  candidate_years: 6
  max_required_years: 11     # drop roles whose JD demands MORE than this (too senior)
  drop_out_of_band: true     # set false to keep out-of-band roles (just flagged)

  # Drop the role if its title/location contains any of these.
  exclude_keywords:
    # too junior
    - intern
    - internship
    - "new grad"
    - "new graduate"
    - graduate program
    - apprentice
    - trainee
    - "working student"
    - junior
    - "jr."
    - "entry level"
    - "entry-level"
    # NOTE: "Vice President" and "Associate" are NOT excluded — at banks/finance
    # GCCs these are senior IC *levels* (VP ≈ 6-10 yrs, ₹52-90L), exactly your
    # target. The experience-band filter still drops genuinely junior ones.
    # too senior / management (Senior/Staff/Lead/Principal/VP are kept — your targets)
    - director            # also catches Executive/Managing Director (bank ED/MD = too senior)
    - "head of"
    - chief
    - "distinguished engineer"
    - fellow

  # Excluded EVERYWHERE EXCEPT finance companies (marked `finance: true`), where
  # "Vice President" / "Associate" are senior IC *levels*, not exec/junior.
  exclude_unless_finance:
    - "vice president"
    - associate

  # Never alert for your own employer (NDA + you're not leaving).
  exclude_companies:
    - dream11
    - "dream sports"
    - fancode
    - "sporta technologies"

