  - { name: Salesforce, ats: workday,   host: salesforce.wd12.myworkdayjobs.com, site: External_Career_Site, tier: "Product GCC" }
  - { name: Adobe,      ats: workday,   host: adobe.wd5.myworkdayjobs.com,        site: external_experienced, tier: "Product GCC" }

  # --- UAE / Europe roadmap targets (via their ATS feeds) ---
  - { name: Stripe,       ats: greenhouse, token: stripe,       tier: "EU/Blr · Fintech" }
  - { name: Adyen,        ats: greenhouse, token: adyen,        tier: "Amsterdam · Fintech" }
  - { name: N26,          ats: greenhouse, token: n26,          tier: "Berlin · Fintech" }
  - { name: Spotify,      ats: lever,      token: spotify,      tier: "EU · Media-tech" }
  - { name: Celonis,      ats: greenhouse, token: celonis,      tier: "Munich · SaaS" }
  - { name: Monzo,        ats: greenhouse, token: monzo,        tier: "London · Fintech" }
  - { name: GetYourGuide, ats: greenhouse, token: getyourguide, tier: "Berlin · Travel-tech" }

